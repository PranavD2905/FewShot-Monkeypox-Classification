# Short run EfficientNet_B0 with overfitting mitigations
N_way: 2
K_shot: 5
Q_query: 10
embedding_dim: 256
num_episodes: 200
lr: 5e-5
weight_decay: 1e-4
batch_size: 16
optimizer: Adam
backbone: efficientnet_b0
fine_tune_layers: 0
projection_dropout: 0.3
distance: cosine
temperature: 0.7
patience_val: 3
device: mps
data_root: data
img_size: 224
val_ratio: 0.2
val_every: 50
val_episodes: 200
checkpoint_dir: checkpoints/overfit_fix_efficientnet
log_file: train_efficientnet_overfit_fix.log
test_episodes: 500
output_dir: outs
seed: 42